<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Köszönöm!</title>

  <style>
    body{
      font-family: Arial, sans-serif;
      margin:0;
      background:#f5f5f5;
      display:flex;
      justify-content:center;
      align-items:center;
      min-height:100vh;
      padding:20px;
      text-align:center;
    }

    .box{
      background:#fff;
      padding:40px 25px;
      border-radius:15px;
      box-shadow:0 5px 20px rgba(0,0,0,0.15);
      max-width:520px;
      width:100%;
    }

    h1{
      color:#2e7d32;
      margin-top:0;
    }

    p{
      font-size:16px;
      line-height:1.5;
      margin:10px 0;
      color:#333;
    }

    .button{
      display:inline-block;
      padding:12px 25px;
      background:#2e7d32;
      color:white;
      border-radius:6px;
      text-decoration:none;
      margin-top:20px;
      font-weight:bold;
    }

    .button:hover{
      background:#1b5e20;
    }
  </style>
</head>

<body>
  <div class="box">
    <h1>Köszönöm a megkeresést!</h1>
    <p>Az üzenet sikeresen elküldve.</p>
    <p>Hamarosan felveszem Önnel a kapcsolatot időpontegyeztetés céljából.</p>

    <a class="button" href="index.html">Vissza a főoldalra</a>
  </div>
</body>
</html>
